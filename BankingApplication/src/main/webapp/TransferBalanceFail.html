<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Transfer Failed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffe6e6;
            text-align: center;
            padding-top: 100px;
        }

        .container {
            display: inline-block;
            background-color: white;
            padding: 30px;
            border: 2px solid red;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(255, 0, 0, 0.3);
        }

        h1 {
            color: red;
        }

        p {
            color: #333;
            font-size: 18px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ff4d4d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background-color: #e60000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Transfer Failed</h1>
        <p>Oops! Something went wrong during the transfer.</p>
        <p>Please ensure the recipient account is valid and you have sufficient balance.</p>
        <a href="TransferBalance.html">Try Again</a>
    </div>
</body>
</html>
