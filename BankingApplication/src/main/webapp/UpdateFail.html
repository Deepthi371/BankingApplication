<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Update Failed</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        height: 100vh;
        background: linear-gradient(120deg, #74ebd5 0%, #ACB6E5 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: #2c3e50;
        padding: 20px;
        text-align: center;
    }

    h2 {
        font-size: 32px;
        margin-bottom: 15px;
        color: #e74c3c; /* red to indicate failure */
        font-weight: 700;
        text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    p {
        font-size: 18px;
        margin-bottom: 25px;
        max-width: 400px;
    }

    a {
        display: inline-block;
        background-color: #3498db;
        color: white;
        padding: 12px 25px;
        font-weight: 600;
        border-radius: 8px;
        text-decoration: none;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        transition: background-color 0.3s ease;
    }

    a:hover {
        background-color: #2575bd;
    }
</style>
</head>
<body>
    <h2>Update Failed!</h2>
    <p>There was a problem updating your information. Please check your account number and try again.</p>
    <a href="Update.html">Try Again</a>
</body>
</html>
