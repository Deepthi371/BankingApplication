<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registration Failed. Try Again.</title>
<style>
  body {
    font-family: Arial, sans-serif;
    height: 100vh;
    margin: 0;
    background: linear-gradient(120deg, #74ebd5 0%, #ACB6E5 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #2c3e50;
  }

  h3 {
    background: #ffffffdd;
    padding: 20px 40px;
    border-radius: 12px;

    font-weight: 600;
    margin-bottom: 30px;
  }

  a {
    text-decoration: none;
    background-color: #3498db;
    color: white;
    padding: 12px 28px;
    border-radius: 8px;
    font-weight: 600;
    box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    transition: background-color 0.3s ease;
  }

  a:hover {
    background-color: #2575bd;
  }

  <h3>Registration Failed</h3>
