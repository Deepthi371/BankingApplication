<html>

<style>

        display: flex;
        justify-content: center;
        align-items: center;

        display: inline-block;
        padding: 10px 20px;
        background-color: #3498db;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: background-color 0.3s ease;

        background-color: #2980b9;
    }
