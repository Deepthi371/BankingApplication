<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Password Change Mismatch</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        height: 100vh;
        background: linear-gradient(120deg, #74ebd5 0%, #ACB6E5 100%);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background-color: #ffffffdd;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        width: 90%;
        max-width: 400px;
        text-align: center;
    }

    h4 {
        color: #e74c3c;
        margin-bottom: 25px;
        font-size: 22px;
    }

    label {
        display: block;
        margin-top: 10px;
        text-align: left;
        color: #333;
        font-weight: bold;
    }

    input[type="password"] {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 6px;
    }

    input[type="submit"] {
        background-color: #3498db;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s ease;
        width: 100%;
    }

    input[type="submit"]:hover {
        background-color: #2980b9;
    }
</style>
</head>
<body>
    <div class="container">
        <h4>❌ New password and confirm password did not match!</h4>
        
        <form action="ChangePwd" method="post">
            <label>Enter the old password</label>
            <input type="password" name="opwd" required>

            <label>Enter the new password</label>
            <input type="password" name="npwd" required>

            <label>Confirm the new password</label>
            <input type="password" name="cnpwd" required>

            <input type="submit" value="Change Password">
        </form>
    </div>
</body>
</html>
