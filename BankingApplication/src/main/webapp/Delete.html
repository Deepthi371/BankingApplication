<!DOCTYPE html>
<html>
<head>
    <title>Delete Account</title>
    <meta charset="UTF-8" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            background: linear-gradient(120deg, #74ebd5 0%, #ACB6E5 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logout button container */
        .logout-container {
            width: 100%;
            padding: 10px 20px;
            text-align: left;
            box-sizing: border-box;
        }
        .logout-container form button {
            background-color: blue;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .logout-container form button:hover {
            background-color: #003d99;
        }

        /* Main form container */
        .container {
            background-color: #ffffffdd;
            padding: 30px 40px;
            border-radius: 10px;
            margin-top: 40px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            color: #444;
            display: block;
            text-align: left;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #bbb;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-size: 16px;
        }

        input[type="submit"] {
            background-color: #e74c3c;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: 100%;
            font-size: 16px;
        }
        input[type="submit"]:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="logout-container">
        <form action="logout" method="get" style="display: inline;">
            <button type="submit">Logout</button>
        </form>
    </div>

    <div class="container">
        <h2>Delete Your Account</h2>
        <form action="Delete" method="post">
            <label for="accno">Account Number</label>
            <input type="text" id="accno" name="accno" required>
            
            <input type="submit" value="Delete" onclick="return confirm('Are you sure you want to delete this account?');">
        </form>
    </div>

</body>
</html>
